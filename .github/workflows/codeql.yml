name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 주간 보안 스캔(월요일 03:37 UTC — off-peak).
    - cron: '37 3 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    # private 레포는 code scanning 결과 업로드가 막힌다(GitHub Advanced Security 필요).
    # 그래서 private 동안에는 job 을 건너뛰고(중립, 실패 X 없음), public 전환 시
    # 워크플로 수정 없이 자동으로 활성화된다.
    if: ${{ github.event.repository.private == false }}
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # build-mode: none — 빌드 없이 소스를 분석한다(GitHub Actions 호스티드는 manual 미지원).
      # 빌드 스텝·JDK·Gradle 설정이 필요 없어 CodeQL 분석이 가볍고 빠르다.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          language: java-kotlin
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v3
        with:
          category: "/language:java-kotlin"
