name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 'JDK 17+ 호환' 주장을 17·21 두 환경에서 실증한다(toolchain 17 + runner 매트릭스).
        java: ['17', '21']
    steps:
      - uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # build = compile + test. test 에는 Konsist java.time-free 강제, 골든 벡터 회귀,
      # LINE 80% / BRANCH 60% 커버리지 게이트가 포함된다.
      - name: Build, test, architecture & coverage check
        run: ./gradlew build --stacktrace

      - name: Upload JaCoCo coverage reports
        if: matrix.java == '21'
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: '**/build/reports/jacoco/test/html'
          if-no-files-found: ignore

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ktlint 는 도메인 인라인 주석 패턴과 충돌해 빌드 게이트에서 분리돼 있다.
      # CI 에서는 informational 로 돌려 포맷 드리프트를 가시화한다(실패해도 CI 는 통과).
      - name: ktlint (informational)
        run: ./gradlew ktlintCheck --continue || true
