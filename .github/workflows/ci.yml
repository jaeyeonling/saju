name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 최소 권한 — CI 는 소스 읽기만 필요하다(GITHUB_TOKEN least-privilege).
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 'JDK 17+ 호환' 주장을 17·21 두 환경에서 실증한다(toolchain 17 + runner 매트릭스).
        java: ['17', '21']
    steps:
      - uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # build = compile + test. test 에는 Konsist java.time-free 강제, 골든 벡터 회귀,
      # LINE 80% / BRANCH 60% 커버리지 게이트가 포함된다.
      - name: Build, test, architecture & coverage check
        run: ./gradlew build --stacktrace

      - name: Upload JaCoCo coverage reports
        if: matrix.java == '21'
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-reports
          path: '**/build/reports/jacoco/test/html'
          if-no-files-found: ignore

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # ktlint 는 build job(./gradlew build → check → ktlintCheck)에서 이미 게이트로 강제된다.
      # 이 잡은 ktlint 위반 위치를 한데 모아 빠르게 보여주는 보조 리포트다(게이트는 build job 담당).
      - name: ktlint (보조 리포트)
        run: ./gradlew ktlintCheck --continue || true
