version: 2
updates:
  # Gradle 의존성(kotlin·kotest·kotlinx-serialization·ktlint 등) 주간 업데이트 PR.
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    groups:
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "org.jetbrains.kotlinx*"

  # GitHub Actions(checkout·setup-java·setup-gradle·codeql 등) 주간 업데이트 PR.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
