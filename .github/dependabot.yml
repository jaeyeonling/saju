version: 2
updates:
  # Gradle 의존성(kotlin·kotest·kotlinx-serialization·ktlint 등) 주간 업데이트 PR.
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    groups:
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "org.jetbrains.kotlinx*"

  # GitHub Actions(checkout·setup-java·setup-gradle·codeql 등) 주간 업데이트 PR.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    groups:
      # init/analyze 는 같은 버전이어야 한다 — 따로 올리면 config 버전 불일치로 CI 가 깨진다.
      codeql:
        patterns:
          - "github/codeql-action*"

